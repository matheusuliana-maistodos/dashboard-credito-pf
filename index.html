<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard Crédito PF — AmorSaúde · Maio 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --purple:#7200d6;--purple-l:#f0e6fd;--purple-m:#9b38e8;
  --green:#70e000; --green-d:#3a6e00;--green-l:#e8fbd0;
  --pink:#e5087e;  --pink-l:#fde8f3;
  --gray:#7e7e7e;  --gray-l:#f5f5f5;--gray-m:#e4e4e4;
  --white:#fff;    --text:#111;     --muted:#555;--faint:#999;
  --danger:#c0392b;--danger-l:#fdf0ef;
  --warn:#b45309;  --warn-l:#fef9ec;
  --ok:#276221;    --ok-l:#edf7ec;
  --border:#e8e8e8;--r:8px;--r-lg:14px;
  --shadow:0 1px 4px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lexend',sans-serif;background:#f7f4fc;color:var(--text);font-size:13px;line-height:1.5}

/* HEADER */
.hdr{background:var(--purple);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:56px;box-shadow:0 2px 8px rgba(114,0,214,.3)}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-logo img{height:36px;object-fit:contain}
.hdr-div{width:1px;height:30px;background:rgba(255,255,255,.25)}
.hdr-text .t1{color:#fff;font-size:13px;font-weight:600;letter-spacing:-.01em}
.hdr-text .t2{color:rgba(255,255,255,.6);font-size:10px}
.mes-tag{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:500}

/* NAV */
.nav{background:var(--white);border-bottom:2px solid var(--gray-m);padding:0 28px;display:flex;overflow-x:auto;box-shadow:var(--shadow)}
.nb{padding:11px 18px;border:none;background:none;font-family:'Lexend',sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.nb:hover{color:var(--purple)}
.nb.on{color:var(--purple);border-bottom-color:var(--purple);font-weight:600}

/* LAYOUT */
.main{padding:20px 28px;max-width:1400px;margin:0 auto}
.sec{font-size:10px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.1em;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--gray-m)}

/* CARD */
.card{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border);padding:16px 18px;box-shadow:var(--shadow)}
.ct{font-size:11px;font-weight:600;color:var(--text);margin-bottom:12px}
.two{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}

/* KPI TILE — compact for single-row fit */
.krow{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px}
.kt{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border);padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kt::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r-lg) var(--r-lg) 0 0}
.kt.pu::before{background:var(--purple)}
.kt.gn::before{background:var(--green)}
.kt.pk::before{background:var(--pink)}
.kt.gy::before{background:var(--gray)}
.kl{font-size:9px;font-weight:500;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.kv{font-size:20px;font-weight:700;letter-spacing:-.02em;line-height:1.1;margin-bottom:2px}
.ks{font-size:9px;color:var(--muted);margin-top:2px}
.kb{display:inline-block;font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;margin-top:5px;width:fit-content}
.pbar{background:var(--gray-l);border-radius:20px;height:4px;margin-top:6px;overflow:hidden}
.pbi{height:100%;border-radius:20px;transition:width .5s}
.b-ok{background:var(--ok-l);color:var(--ok)}
.b-warn{background:var(--warn-l);color:var(--warn)}
.b-danger{background:var(--danger-l);color:var(--danger)}
.b-purple{background:var(--purple-l);color:var(--purple)}

/* HERO STRIP */
.hstrip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.hc{border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--shadow)}
.hc-pu{background:var(--purple);color:#fff}
.hc-pu .kl,.hc-pu .ks{color:rgba(255,255,255,.65)}
.hc-pu .kv{color:#fff}
.hc-rd{background:var(--danger);color:#fff}
.hc-rd .kl,.hc-rd .ks{color:rgba(255,255,255,.7)}
.hc-rd .kv{color:#fff}
.hc-gn{background:var(--green-d);color:#fff}
.hc-gn .kl,.hc-gn .ks{color:rgba(255,255,255,.65)}
.hc-gn .kv{color:#fff}
.hc-lt{background:var(--white);border:1px solid var(--border)}

/* KPI STRATEGIC GRID */
.kgrid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}

/* PROGRESS BAR with label inside strategic KPI */
.kpi-bar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;font-size:10px}
.kpi-bar-track{background:var(--gray-l);border-radius:20px;height:8px;overflow:hidden;margin-top:4px}
.kpi-bar-fill{height:100%;border-radius:20px}

/* FUNIL */
.funnel{display:flex;flex-direction:column;gap:5px}
.fr{display:flex;align-items:center;gap:8px}
.fl{font-size:11px;color:var(--muted);width:130px;flex-shrink:0}
.fbw{flex:1;background:var(--gray-l);border-radius:3px;height:20px;overflow:hidden}
.fb{height:100%;border-radius:3px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:600;color:#fff;min-width:6px}
.fv{font-size:11px;font-weight:600;min-width:52px;text-align:right}

/* REG BARS */
.rr{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.rr:last-child{border-bottom:none}
.rn{font-size:11px;font-weight:600;min-width:86px}
.rbw{flex:1;background:var(--gray-l);border-radius:3px;height:18px;overflow:hidden}
.rb{height:100%;border-radius:3px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:600;color:#fff}
.rp{font-size:11px;font-weight:700;min-width:38px;text-align:right}

/* TABLE */
.tw{overflow-x:auto}
table.dt{width:100%;border-collapse:collapse;font-size:11px}
table.dt th{text-align:left;padding:6px 9px;font-size:9px;font-weight:600;color:var(--faint);border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;background:var(--white);cursor:pointer}
table.dt th:hover{color:var(--purple)}
table.dt td{padding:6px 9px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
table.dt tr:hover td{background:#f9f5ff}
table.dt tr:last-child td{border-bottom:none}
.pill{display:inline-block;font-size:9px;font-weight:600;padding:2px 6px;border-radius:20px}

/* INS */
.ins{border-radius:var(--r);padding:11px 14px;font-size:11px;line-height:1.65}
.ins-t{font-weight:600;font-size:11px;margin-bottom:3px}
.ins-ok{background:var(--ok-l);color:var(--ok)}
.ins-warn{background:var(--warn-l);color:var(--warn)}
.ins-danger{background:var(--danger-l);color:var(--danger)}
.ins-purple{background:var(--purple-l);color:var(--purple)}

/* ROW COLORS */
.tr-pot-a td{background:#fdf5f5!important}.tr-pot-a:hover td{background:#fde0e0!important}
.tr-pot-b td{background:#fffcf0!important}.tr-pot-b:hover td{background:#fef5d0!important}
.tr-promo td{background:#f0fbea!important}.tr-promo:hover td{background:#e0f5d5!important}
.tr-zerada td{background:#fff8f0!important}.tr-zerada:hover td{background:#ffeedd!important}

/* VIEWS */
.view{display:none}.view.on{display:block}

.footer{text-align:center;padding:14px;font-size:10px;color:var(--faint);border-top:1px solid var(--border);margin-top:20px}

@media(max-width:900px){.krow,.hstrip,.kgrid4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.krow,.hstrip,.kgrid4{grid-template-columns:repeat(1,1fr)}.main,.nav,.hdr{padding-left:14px;padding-right:14px}}

/* ── RANKING ROW COLORS ── */
.rank-gold   td { background: linear-gradient(90deg,#fffde7,#fff9c4) !important; }
.rank-silver td { background: linear-gradient(90deg,#f5f5f5,#eeeeee) !important; }
.rank-bronze td { background: linear-gradient(90deg,#fbe9e7,#ffccbc) !important; }
.rank-gold:hover   td { background: #fff59d !important; }
.rank-silver:hover td { background: #e0e0e0 !important; }
.rank-bronze:hover td { background: #ffab91 !important; }
table.dt thead tr th { cursor: default; }

/* ── RANKING DROPDOWN ── */
.rk-drop-btn {
  padding:7px 14px; border-radius:20px; border:1px solid var(--border);
  background:#fff; color:var(--muted); font-family:'Lexend',sans-serif;
  font-size:11px; cursor:pointer; white-space:nowrap;
  display:flex; align-items:center; gap:6px;
  transition:border-color .15s, background .15s;
}
.rk-drop-btn:hover   { border-color:var(--purple); color:var(--purple); }
.rk-drop-btn-on      { border-color:var(--purple)!important; background:var(--purple)!important; color:#fff!important; }
.rk-badge {
  background:#fff; color:var(--purple); border-radius:20px;
  font-size:9px; font-weight:700; padding:1px 6px; margin-left:2px;
  min-width:18px; text-align:center;
}
.rk-drop-btn-on .rk-badge { background:var(--green); color:#1a3a00; }
.rk-drop-panel {
  position:absolute; top:calc(100% + 6px); left:0; z-index:999;
  background:#fff; border:1px solid var(--border); border-radius:var(--r-lg);
  box-shadow:0 8px 24px rgba(0,0,0,.13); padding:6px;
  min-width:200px; max-height:320px; overflow-y:auto;
}
.rk-drop-wide { min-width:280px; }
.rk-drop-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:4px 6px 8px; border-bottom:1px solid var(--border); margin-bottom:4px;
  font-size:10px; font-weight:600; color:var(--faint);
}
.rk-drop-clear {
  font-size:9px; color:var(--purple); background:none; border:none;
  cursor:pointer; font-family:'Lexend',sans-serif; padding:0;
}
.rk-drop-clear:hover { text-decoration:underline; }
.rk-drop-item {
  display:flex; align-items:center; gap:8px; padding:5px 8px;
  font-size:11px; cursor:pointer; border-radius:6px; margin-bottom:1px;
  transition:background .1s;
}
.rk-drop-item:hover  { background:var(--gray-l); }
.rk-item-on          { background:var(--purple-l)!important; color:var(--purple); font-weight:500; }
.rk-drop-item input[type=checkbox] { accent-color:var(--purple); flex-shrink:0; cursor:pointer; }

</style>
</head>

function pill(v,ok,wn,lbl){

const VM={'interior':'INTERIOR','sp-minas':'SP-MINAS','centro-sul':'CENTRO-SUL','equatorial':'EQUATORIAL','costa-leste':'COSTA LESTE'};
function sv(id,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('v-'+id).classList.add('on');
  btn.classList.add('on');
  const el=document.getElementById('d-'+id);
  if(!el||el.dataset.built) return;
  if(VM[id]) buildReg(VM[id],'d-'+id);
  else if(id==='dados-as') buildDadosAS();
  el.dataset.built=1;
}

/* ── UF breakdown ── */
function ufData(regKey){
  const map={};
  CLINICAS.filter(c=>c.regional===regKey).forEach(c=>{
    if(!map[c.uf]) map[c.uf]={real:0,contratos:0,zeradas:0,total:0};
    map[c.uf].real+=c.realizado_cpf;
    map[c.uf].contratos+=c.contratos;
    map[c.uf].zeradas+=c.realizado_cpf===0?1:0;
    map[c.uf].total+=1;
  });
  return Object.entries(map).sort((a,b)=>b[1].real-a[1].real);
}

        <td>${Math.round(zeradas.reduce((s,c)=>s+(c.proj_sp1||0),0))}</td>
        <td>${Math.round(zeradas.reduce((s,c)=>s+(c.proj_ap1||0),0))}</td>
        <td>${Math.round(zeradas.reduce((s,c)=>s+(c.proj_sp2||0),0))}</td>
        <td>${Math.round(zeradas.reduce((s,c)=>s+(c.proj_ap2||0),0))}</td>
        <td style="color:var(--green-d)">${Math.round(zeradas.reduce((s,c)=>s+(c.proj_ct||0),0))}</td>
        <td style="color:var(--ok)">${fN(zeradas.reduce((s,c)=>s+(c.proj_receita||0),0))}</td>
      </tr>
      </tbody>
    </table></div>
  <div id="ranking-${regKey.replace(/\s+/g,'-').toLowerCase()}"></div>
  `;
  buildRankingSection(regKey);
}

function buildDadosAS(){
  const el=document.getElementById('d-dados-as');
  let activeReg='ALL', sortCol='orcado_total', sortDir=-1, showOnly='all';

  function getClis(){
    let l=activeReg==='ALL'?CLINICAS.filter(c=>c.orcado_total>0):CLINICAS.filter(c=>c.regional===activeReg&&c.orcado_total>0);
    if(showOnly==='potencial') l=l.filter(c=>c.is_potencial);
    return l.sort((a,b)=>sortDir*(b[sortCol]-a[sortCol]));
  }
  function src(){return activeReg==='ALL'?NAC_AS:(REG_AS[activeReg]||NAC_AS);}

  function btnSt(on,cor){return`font-size:11px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-family:'Lexend',sans-serif;font-weight:500;background:${on?cor:'var(--white)'};color:${on?'#fff':'var(--muted)'}`;}

  function render(){
    const s=src(); const label=activeReg==='ALL'?'Nacional':RL[activeReg];
    const list=getClis();
    const potA=list.filter(c=>c.is_potencial&&c.cpf_zerado);
    const potB=list.filter(c=>c.is_potencial&&!c.cpf_zerado);
    const totA=potA.reduce((ss,c)=>ss+c.pot_ganho,0);
    const totB=potB.reduce((ss,c)=>ss+c.pot_ganho,0);

    const regCols=activeReg==='ALL'?REGS.map(r=>{const rs=REG_AS[r]||{};return`<tr>
      <td style="font-weight:700;color:${RC[r]}">${RL[r]}</td>
      <td>${fN(rs.orcado_total||0)}</td><td>${fN(rs.efetivacao_total||0)}</td>
      <td>${pill(rs.conversao||0,28,24)}</td>
      <td>${fN(rs.tm_orcado||0)}</td><td>${fN(rs.tm_efetivado||0)}</td>
      <td>${pillShare(rs.share_cpf||0,NAC_AS.share_cpf)}</td>
      <td style="color:var(--purple);font-weight:600">${fN(rs.realizado_cpf||0)}</td>
    </tr>`;}).join(''):'';

    const thH=(key,lbl)=>`<th onclick="__ds('${key}')">${lbl}${sortCol===key?(sortDir>0?' ↑':' ↓'):''}</th>`;

    el.innerHTML=`
    <div class="sec" style="margin-top:0">Dados AmorSaúde — Conversão · Share Crédito PF · Produtividade</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
      <button onclick="__dr('ALL')" style="${btnSt(activeReg==='ALL','var(--purple)')}">Nacional</button>
      ${REGS.map(r=>`<button onclick="__dr('${r}')" style="${btnSt(activeReg===r,RC[r])}">${RL[r]}</button>`).join('')}
    </div>
    <div class="krow" style="grid-template-columns:repeat(5,1fr)">
      <div class="kt pu"><div class="kl">Orçado total</div><div class="kv" style="color:var(--purple);font-size:18px">${fN(s.orcado_total)}</div><div class="ks">${label}</div></div>
      <div class="kt gn"><div class="kl">Efetivação total</div><div class="kv" style="color:var(--green-d);font-size:18px">${fN(s.efetivacao_total)}</div><div class="ks">${fP(s.conversao)} conversão</div></div>
      <div class="kt pu"><div class="kl">TM orçado</div><div class="kv" style="color:var(--purple);font-size:18px">${fN(s.tm_orcado)}</div><div class="ks">por trat. orçado</div></div>
      <div class="kt gn"><div class="kl">TM efetivado</div><div class="kv" style="color:var(--green-d);font-size:18px">${fN(s.tm_efetivado)}</div><div class="ks">por trat. efetivado</div></div>
      <div class="kt pk"><div class="kl">Share Crédito PF</div><div class="kv" style="color:${s.share_cpf>=13?'var(--ok)':s.share_cpf>=9?'var(--warn)':'var(--danger)'};font-size:18px">${fP(s.share_cpf)}</div><div class="ks">CPF / efetivação total</div></div>
    </div>
    ${activeReg==='ALL'?`<div class="card" style="margin-bottom:12px">
      <div class="ct">Consolidado por regional</div>
      <div class="tw"><table class="dt">
        <thead><tr><th>Regional</th><th>Orçado total</th><th>Efetivação total</th><th>% Conversão</th><th>TM orçado</th><th>TM efetivado</th><th>Share CPF</th><th>Crédito PF</th></tr></thead>
        <tbody>${regCols}<tr style="background:#f6f0ff;font-weight:700">
          <td>🌐 Nacional</td><td>${fN(NAC_AS.orcado_total)}</td><td>${fN(NAC_AS.efetivacao_total)}</td>
          <td><span class="pill b-purple">${fP(NAC_AS.conversao)}</span></td>
          <td>${fN(NAC_AS.tm_orcado)}</td><td>${fN(NAC_AS.tm_efetivado)}</td>
          <td><span class="pill b-purple">${fP(NAC_AS.share_cpf)}</span></td>
          <td style="color:var(--purple)">${fN(NAC_AS.realizado_cpf)}</td>
        </tr></tbody>
      </table></div>
    </div>`:''}
    <div class="two" style="margin-bottom:12px;gap:10px">
      <div class="ins ins-danger"><div class="ins-t">🔴 ${potA.length} clínicas sem CPF — abaixo da média nacional (${fP(BENCH.media_conv)})</div>Potencial: <strong>${fN(totA)}</strong></div>
      <div class="ins ins-warn"><div class="ins-t">🟡 ${potB.length} clínicas com CPF aquém do potencial</div>Potencial adicional: <strong>${fN(totB)}</strong></div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <div class="ct" style="margin-bottom:0">Clínicas — ${list.length} registros</div>
        <div style="display:flex;gap:6px">
          <button onclick="__df('all')" style="${btnSt(showOnly==='all','var(--purple)')}">Todas</button>
          <button onclick="__df('potencial')" style="${btnSt(showOnly==='potencial','var(--pink)')}" >⚡ Potenciais (${CLINICAS.filter(c=>c.is_potencial&&c.orcado_total>0&&(activeReg==='ALL'||c.regional===activeReg)).length})</button>
        </div>
      </div>
      <div style="font-size:9px;color:var(--faint);margin-bottom:7px">Ref. conversão = média nacional ${fP(BENCH.media_conv)} · 🔴 sem CPF + abaixo · 🟡 com CPF + abaixo · clique cabeçalho para ordenar</div>
      <div class="tw"><table class="dt">
        <thead><tr><th>Clínica</th><th>Reg/UF</th>
          ${thH('orcado_total','Orçado')}${thH('efetivacao_total','Efetivado')}
          ${thH('conversao','Conversão')}${thH('tm_orcado','TM orç.')}${thH('tm_efetivado','TM efet.')}
          ${thH('efet_cadeira','Efet./cad')}${thH('share_cpf','Share CPF')}${thH('realizado_cpf','CPF')}
          <th>Potencial</th>
        </tr></thead>
        <tbody>${list.map(c=>{
          const cls=c.is_potencial?(c.cpf_zerado?'tr-pot-a':'tr-pot-b'):'';
          const ico=c.is_potencial?(c.cpf_zerado?'🔴 ':'🟡 '):'';
          const gapTxt=c.gap_conv>0?`<div style="font-size:9px;color:${c.cpf_zerado?'var(--danger)':'var(--warn)'}">conv. −${fP(c.gap_conv)}</div>`:'';
          return`<tr class="${cls}">
            <td style="font-weight:600;font-size:11px">${ico}${c.clinica}${gapTxt}</td>
            <td style="font-size:9px;color:var(--muted)">${(RL[c.regional]||c.regional)}<br>${c.uf}</td>
            <td>${fN(c.orcado_total)}</td><td style="color:var(--ok);font-weight:600">${fN(c.efetivacao_total)}</td>
            <td>${pill(c.conversao,BENCH.media_conv,BENCH.media_conv*0.85)}</td>
            <td>${c.tm_orcado>0?fN(c.tm_orcado):'—'}</td><td>${c.tm_efetivado>0?fN(c.tm_efetivado):'—'}</td>
            <td>${c.cadeiras>0?fN(c.efet_cadeira):'—'}<span style="font-size:9px;color:var(--faint)"> (${c.cadeiras})</span></td>
            <td>${pillShare(c.share_cpf,NAC_AS.share_cpf)}</td>
            <td style="font-weight:600;color:${c.realizado_cpf>0?'var(--purple)':'var(--danger)'}">${c.realizado_cpf>0?fN(c.realizado_cpf):'0'}</td>
            <td style="font-size:10px;font-weight:600;color:${c.is_potencial?'var(--ok)':'var(--faint)'}">${c.is_potencial?'+'+fN(c.pot_ganho):'—'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
    el.dataset.built='1';
  }

  if(!document.getElementById('das-sty')){
    const s=document.createElement('style');s.id='das-sty';
    s.textContent=`.tr-pot-a td{background:#fdf5f5!important}.tr-pot-b td{background:#fffcf0!important}.tr-pot-a:hover td{background:#fde0e0!important}.tr-pot-b:hover td{background:#fef5d0!important}.tr-promo td{background:#f0fbea!important}.tr-zerada td{background:#fff8f0!important}`;
    document.head.appendChild(s);
  }

  window.__dr=r=>{activeReg=r;el.dataset.built='';render();};
  window.__df=f=>{showOnly=f;el.dataset.built='';render();};
  window.__ds=col=>{if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=-1;}el.dataset.built='';render();};
  render();
}


/* ═══════════════════════════════════
   RANKING REGIONAL v3
   — Dropdown com checkboxes: clínicas + UFs
   — Export XLSX + PDF (total ou seleção)
═══════════════════════════════════ */

const __rkState = {};

/* SheetJS lazy load */
function _loadSheetJS(cb){
  if(window.XLSX){ cb(); return; }
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=cb; document.head.appendChild(s);
}

/* ── Close dropdowns when clicking outside ── */
document.addEventListener('click', e => {
  if(!e.target.closest('.rk-dropdown-wrap')){
    Object.keys(__rkState).forEach(cid => {
      if(__rkState[cid].showUFDrop || __rkState[cid].showCliDrop){
        __rkState[cid].showUFDrop  = false;
        __rkState[cid].showCliDrop = false;
        renderRk(cid);
      }
    });
  }
});

function buildRankingSection(regKey){
  const cid    = 'ranking-' + regKey.replace(/\s+/g,'-').toLowerCase();
  const target = document.getElementById(cid);
  if(!target) return;

  const allClis = CLINICAS
    .filter(c => c.regional === regKey)
    .sort((a,b) => b.realizado_cpf - a.realizado_cpf);

  const allUFs = [...new Set(allClis.map(c => c.uf).filter(Boolean))].sort();

  if(!__rkState[cid]){
    __rkState[cid] = {
      selUFs:      new Set(),   // vazio = todos
      selClis:     new Set(),   // vazio = todas
      showUFDrop:  false,
      showCliDrop: false,
    };
  }

  /* ── lista visível ── */
  function getList(){
    const {selUFs, selClis} = __rkState[cid];
    return allClis.filter(c => {
      const uOK = selUFs.size  === 0 || selUFs.has(c.uf);
      const cOK = selClis.size === 0 || selClis.has(c.clinica);
      return uOK && cOK;
    });
  }

  /* ── helpers de label ── */
  function ufBtnLabel(){
    const s = __rkState[cid].selUFs;
    if(s.size === 0) return 'Todos os estados';
    if(s.size <= 3)  return [...s].join(', ');
    return [...s].slice(0,2).join(', ') + ` +${s.size-2}`;
  }
  function cliBtnLabel(){
    const s = __rkState[cid].selClis;
    if(s.size === 0) return 'Todas as clínicas';
    if(s.size === 1) return [...s][0].length > 22 ? [...s][0].slice(0,21)+'…' : [...s][0];
    return `${s.size} clínicas selecionadas`;
  }

  /* ═══ RENDER ═══ */
  function renderRanking(){
    const st      = __rkState[cid];
    const list    = getList();
    const totReal = list.reduce((s,c) => s + c.realizado_cpf, 0);
    const totCt   = list.reduce((s,c) => s + c.contratos,     0);

    // Clínicas disponíveis para o dropdown (respeitando filtro de UF já ativo)
    const clisForDrop = allClis.filter(c =>
      st.selUFs.size === 0 || st.selUFs.has(c.uf)
    );

    const ufActive  = st.selUFs.size  > 0;
    const cliActive = st.selClis.size > 0;

    /* ── dropdown UF ── */
    const ufDropHTML = st.showUFDrop ? `
      <div class="rk-drop-panel" onclick="event.stopPropagation()">
        <div class="rk-drop-header">
          <span>Estados</span>
          <button class="rk-drop-clear" onclick="__rkUFClear('${cid}')">Limpar</button>
        </div>
        <label class="rk-drop-item">
          <input type="checkbox" ${!ufActive?'checked':''} onchange="__rkUFAll('${cid}')">
          <span>Todos</span>
        </label>
        ${allUFs.map(u => `
        <label class="rk-drop-item ${st.selUFs.has(u)?'rk-item-on':''}">
          <input type="checkbox" value="${u}" ${st.selUFs.has(u)?'checked':''}
            onchange="__rkUFToggle('${cid}','${u}')">
          <span>${u}</span>
        </label>`).join('')}
      </div>` : '';

    /* ── dropdown Clínicas ── */
    const cliDropHTML = st.showCliDrop ? `
      <div class="rk-drop-panel rk-drop-wide" onclick="event.stopPropagation()">
        <div class="rk-drop-header">
          <span>${clisForDrop.length} clínicas${ufActive?' (filtrado por UF)':''}</span>
          <button class="rk-drop-clear" onclick="__rkCliClear('${cid}')">Limpar</button>
        </div>
        <div style="padding:6px 10px;border-bottom:1px solid var(--border)">
          <input type="text" placeholder="Buscar..." id="rk-cliSearch-${cid}"
            oninput="__rkCliSearch('${cid}',this.value)"
            onclick="event.stopPropagation()"
            style="width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:6px;
              font-family:'Lexend',sans-serif;font-size:11px;outline:none">
        </div>
        <label class="rk-drop-item">
          <input type="checkbox" ${!cliActive?'checked':''} onchange="__rkCliAll('${cid}')">
          <span>Todas</span>
        </label>
        <div id="rk-cliList-${cid}">
          ${clisForDrop.map(c => `
          <label class="rk-drop-item ${st.selClis.has(c.clinica)?'rk-item-on':''}">
            <input type="checkbox" ${st.selClis.has(c.clinica)?'checked':''}
              onchange="__rkCliToggle('${cid}','${c.clinica.replace(/'/g,"\\'")}')">
            <span>${c.clinica} <small style="color:var(--faint)">${c.uf}</small></span>
          </label>`).join('')}
        </div>
      </div>` : '';

    /* ── tabela ── */
    const tableRows = list.map((c,i) => {
      const medal = i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':'';
      const rc    = i===0?'rank-gold':i===1?'rank-silver':i===2?'rank-bronze':'';
      return `<tr class="${rc}">
        <td style="text-align:center;font-weight:700;font-size:10px;color:${i<3?'var(--purple)':'var(--faint)'}">${i+1}</td>
        <td style="text-align:center">${c.cadeiras||'—'}</td>

        <td style="text-align:center">${c.pct_sp1_puo>0
          ?`<span class="pill ${c.pct_sp1_puo>=35?'b-ok':c.pct_sp1_puo>=20?'b-warn':'b-danger'}">${fP(c.pct_sp1_puo)}</span>`
          :'—'}</td>
        <td style="text-align:right;font-weight:600;color:var(--green-d)">${Math.round(c.contratos)}</td>
        <td style="text-align:right;font-weight:700;color:${c.realizado_cpf>0?'var(--purple)':'var(--danger)'}">
          ${c.realizado_cpf>0?fN(c.realizado_cpf):'0'}
        </td>
      </tr>`;
    }).join('');

    /* ── barra de seleção ── */
    const selBar = cliActive ? `
      <div style="margin-top:10px;padding:10px 14px;background:var(--purple-l);border-radius:var(--r);
        display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="font-size:11px;color:var(--purple);font-weight:600">
          ${st.selClis.size} clínica(s):
          <span style="font-weight:400">${[...st.selClis].slice(0,3).join(', ')}${st.selClis.size>3?'…':''}</span>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button onclick="__rkDoXLSX('${cid}',true)"
            style="padding:5px 12px;border-radius:20px;border:1px solid var(--green-d);
              background:var(--green-l);color:var(--green-d);
              font-family:'Lexend',sans-serif;font-size:11px;cursor:pointer;font-weight:600">
            ⬇ Excel seleção
          </button>
          <button onclick="__rkDoPDF('${cid}',true)"
            style="padding:5px 12px;border-radius:20px;border:1px solid var(--purple);
              background:var(--purple-l);color:var(--purple);
              font-family:'Lexend',sans-serif;font-size:11px;cursor:pointer;font-weight:600">
            🖨️ PDF seleção
          </button>
          <button onclick="__rkCliClear('${cid}')"
            style="padding:5px 12px;border-radius:20px;border:1px solid var(--border);
              background:#fff;color:var(--muted);
              font-family:'Lexend',sans-serif;font-size:11px;cursor:pointer">
            ✕ Limpar
          </button>
        </div>
      </div>` : '';

    target.innerHTML = `
    <div class="sec">Ranking Mensal · ${RL[regKey]} · Maio 2026</div>
    <div class="card">

      <!-- TOOLBAR -->
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px">

        <!-- Dropdown Clínicas -->
        <div class="rk-dropdown-wrap" style="position:relative">
          <button onclick="__rkToggle('${cid}','cli')"
            class="rk-drop-btn ${cliActive?'rk-drop-btn-on':''}">
            🏥 ${cliBtnLabel()}
            ${cliActive?`<span class="rk-badge">${st.selClis.size}</span>`:''}
          </button>
          ${cliDropHTML}
        </div>

        <!-- Dropdown UF -->
        <div class="rk-dropdown-wrap" style="position:relative">
          <button onclick="__rkToggle('${cid}','uf')"
            class="rk-drop-btn ${ufActive?'rk-drop-btn-on':''}">
            🗺️ ${ufBtnLabel()}
            ${ufActive?`<span class="rk-badge">${st.selUFs.size}</span>`:''}
          </button>
          ${ufDropHTML}
        </div>

        <span style="font-size:10px;color:var(--muted)">${list.length} clínicas</span>

        <!-- Export buttons -->
        <div style="margin-left:auto;display:flex;gap:6px">
          <button onclick="__rkDoXLSX('${cid}',false)"
            style="padding:6px 14px;border-radius:20px;border:1px solid var(--green-d);
              background:var(--green-l);color:var(--green-d);
              font-family:'Lexend',sans-serif;font-size:11px;cursor:pointer;font-weight:600">

          <button onclick="__rkDoPDF('${cid}',false)"

              font-family:'Lexend',sans-serif;font-size:11px;cursor:pointer;font-weight:600">
            🖨️ PDF
          </button>
        </div>
      </div>

      <!-- TABLE -->
      <div class="tw">
        <table class="dt">
          <thead>
            <tr>
              <th style="background:var(--purple);color:#fff;text-align:center;width:28px">#</th>
              <th style="background:var(--purple);color:#fff;text-align:center">Cadeiras</th>

              <th style="background:var(--purple);color:#fff;text-align:center">UF</th>

              <th style="background:var(--purple);color:#fff;text-align:right">SP1</th>
              <th style="background:var(--purple);color:#fff;text-align:center">% SP1/PUO</th>
              <th style="background:var(--purple);color:#fff;text-align:right">Contratos</th>
              <th style="background:var(--purple);color:#fff;text-align:right">Realizado</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
          <tfoot>
            <tr style="background:var(--purple)">
              <td colspan="7" style="color:#fff;font-size:10px;font-weight:600">
                Total · ${list.length} clínicas

              </td>
              <td style="text-align:right;color:var(--green);font-weight:700">${Math.round(totCt)}</td>
              <td style="text-align:right;color:#fff;font-weight:700">${fN(totReal)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
      ${selBar}
    </div>`;
  }

  window.__rkRenders = window.__rkRenders || {};
  window.__rkRenders[cid] = renderRanking;
  window.__rkGetList = window.__rkGetList || {};
  window.__rkGetList[cid] = getList;
  renderRanking();
}

/* ═══════════════════════════════════
   GLOBAL HANDLERS
═══════════════════════════════════ */
window.renderRk = cid => window.__rkRenders?.[cid]?.();

window.__rkToggle = (cid, type) => {
  const st = __rkState[cid];
  if(type==='uf'){
    st.showUFDrop  = !st.showUFDrop;
    st.showCliDrop = false;
  } else {
    st.showCliDrop = !st.showCliDrop;
    st.showUFDrop  = false;
  }
  renderRk(cid);
};

/* UF */
window.__rkUFAll    = cid => { __rkState[cid].selUFs = new Set(); renderRk(cid); };
window.__rkUFClear  = cid => { __rkState[cid].selUFs = new Set(); renderRk(cid); };
window.__rkUFToggle = (cid, uf) => {
  const s = __rkState[cid].selUFs;
  s.has(uf) ? s.delete(uf) : s.add(uf);
  renderRk(cid);
};

/* Clínicas */
window.__rkCliAll   = cid => { __rkState[cid].selClis = new Set(); renderRk(cid); };
window.__rkCliClear = cid => { __rkState[cid].selClis = new Set(); renderRk(cid); };
window.__rkCliToggle = (cid, name) => {
  const s = __rkState[cid].selClis;
  s.has(name) ? s.delete(name) : s.add(name);
  renderRk(cid);
};
window.__rkCliSearch = (cid, q) => {
  // Filter items in the dropdown panel without re-rendering entire component
  const panel = document.getElementById(`rk-cliList-${cid}`);
  if(!panel) return;
  const lq = q.toLowerCase();
  panel.querySelectorAll('label.rk-drop-item').forEach(lbl => {
    const txt = lbl.querySelector('span')?.textContent?.toLowerCase() || '';
    lbl.style.display = txt.includes(lq) ? '' : 'none';
  });
};
window.__rkSelAllVisible = cid => {
  const st   = __rkState[cid];
  const list = window.__rkGetList?.[cid]?.() || [];
  const allSel = list.length > 0 && list.every(c => st.selClis.has(c.clinica));
  if(allSel){
    list.forEach(c => st.selClis.delete(c.clinica));
  } else {
    list.forEach(c => st.selClis.add(c.clinica));
  }
  renderRk(cid);
};

/* ═══════════════════════════════════
   EXPORT HELPERS
═══════════════════════════════════ */
window.__rkDoXLSX = (cid, selOnly) => {
  const st   = __rkState[cid];
  const list = window.__rkGetList?.[cid]?.() || [];
  const rows = selOnly && st.selClis.size > 0
    ? list.filter(c => st.selClis.has(c.clinica))
    : list;
  _loadSheetJS(() => {
    const regLabel = cid.replace('ranking-','').replace(/-/g,' ').toUpperCase();
    const label    = RL[regLabel] || regLabel;
    const data = [
      ['#','Cadeiras','Clínica','UF','PUO','SP1 Simulado','% SP1/PUO','Contratos','Realizado'],
      ...rows.map((c,i) => [
        i+1, c.cadeiras||0, c.clinica, c.uf,
        Math.round(c.puo), Math.round(c.sp1),
        c.pct_sp1_puo > 0 ? c.pct_sp1_puo/100 : 0,
        Math.round(c.contratos), c.realizado_cpf
      ])
    ];
    const ws = XLSX.utils.aoa_to_sheet(data);
    ws['!cols'] = [4,8,32,5,8,10,10,10,14].map(w => ({wch:w}));
    const range = XLSX.utils.decode_range(ws['!ref']);
    for(let R=1; R<=range.e.r; R++){
      const pc = ws[XLSX.utils.encode_cell({r:R,c:6})]; if(pc) pc.z='0.0%';
      const bc = ws[XLSX.utils.encode_cell({r:R,c:8})]; if(bc) bc.z='#,##0.00';
    }
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, label.substring(0,31));
    XLSX.writeFile(wb, `Ranking_${label}${selOnly?'_Selecao':''}_Maio2026.xlsx`);
  });
};

window.__rkDoPDF = (cid, selOnly) => {
  const st   = __rkState[cid];
  const list = window.__rkGetList?.[cid]?.() || [];
  const rows = selOnly && st.selClis.size > 0
    ? list.filter(c => st.selClis.has(c.clinica))
    : list;
  const regLabel = cid.replace('ranking-','').replace(/-/g,' ').toUpperCase();
  const label    = RL[regLabel] || regLabel;
  const totReal  = rows.reduce((s,c)=>s+c.realizado_cpf,0);
  const totCt    = rows.reduce((s,c)=>s+c.contratos,0);
  const trs = rows.map((c,i) => `
    <tr style="background:${i%2===0?'#fff':'#f9f5ff'}">
      <td align="center">${i+1}</td>
      <td align="center">${c.cadeiras||'—'}</td>
      <td><b>${c.clinica}</b></td>
      <td align="center">${c.uf}</td>
      <td align="right">${Math.round(c.puo)}</td>
      <td align="right">${Math.round(c.sp1)}</td>
      <td align="center">${c.pct_sp1_puo>0?fP(c.pct_sp1_puo):'—'}</td>
      <td align="right">${Math.round(c.contratos)}</td>
      <td align="right" style="font-weight:700;color:${c.realizado_cpf>0?'#7200d6':'#c0392b'}">
        ${c.realizado_cpf>0?fN(c.realizado_cpf):'0'}
      </td>
    </tr>`).join('');
  const win = window.open('','_blank','width=980,height=720');
  win.document.write(`<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <title>Ranking ${label} — Maio 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:'Lexend',sans-serif;font-size:11px;color:#111;padding:20px}
      .hd{display:flex;justify-content:space-between;align-items:flex-start;
        margin-bottom:16px;padding-bottom:10px;border-bottom:3px solid #7200d6}
      .t1{font-size:16px;font-weight:700;color:#7200d6}
      .t2{font-size:10px;color:#999;margin-top:3px}
      .tag{background:#7200d6;color:#fff;border-radius:20px;padding:4px 14px;
        font-size:11px;font-weight:600;white-space:nowrap}
      table{width:100%;border-collapse:collapse;margin-top:4px}
      th{background:#7200d6;color:#fff;padding:7px 8px;font-size:10px;font-weight:600;text-align:left}
      td{padding:6px 8px;border-bottom:1px solid #eee;vertical-align:middle}
      .foot td{background:#7200d6;color:#fff;font-weight:700;font-size:11px}
      .btn{background:#7200d6;color:#fff;border:none;padding:8px 24px;border-radius:20px;
        font-family:'Lexend',sans-serif;font-size:12px;cursor:pointer;margin-top:16px}
      .actions{text-align:center}
      @media print{.actions{display:none}@page{margin:10mm;size:A4 landscape}}
    </style>
  </head><body>
    <div class="hd">
      <div>
        <div class="t1">Ranking Mensal · ${label}${selOnly?' · Seleção':''}</div>
        <div class="t2">Crédito PF · AmorSaúde Odontologia · Maio 2026 · ${rows.length} clínicas</div>
      </div>
      <div class="tag">+MaisTODOS</div>
    </div>
    <table>
      <thead><tr>
        <th>#</th><th>Cadeiras</th><th>Clínica</th><th>UF</th>
        <th align="right">PUO</th><th align="right">SP1</th>
        <th align="center">% SP1/PUO</th>
        <th align="right">Contratos</th><th align="right">Realizado</th>
      </tr></thead>
      <tbody>${trs}</tbody>
      <tfoot><tr class="foot">
        <td colspan="7">Total · ${rows.length} clínicas</td>
        <td align="right">${Math.round(totCt)}</td>
        <td align="right">${fN(totReal)}</td>
      </tr></tfoot>
    </table>
    <div class="actions">
      <button class="btn" onclick="window.print()">🖨️ Imprimir / Salvar como PDF</button>
    </div>
  </body></html>`);
  win.document.close();
};
